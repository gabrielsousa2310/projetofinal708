{% extends "baselogado.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-xl-12">

            <div class="mb-5">
                <h1 class="fw-bold">
                    Cadastro de Veículo
                </h1>

                <p class="text-muted mb-0">
                    Registre as informações do veículo no sistema.
                </p>
            </div>
            <div class="card border-0 shadow rounded-4">

                <!-- CABEÇALHO -->

                <div class="card-body p-4 p-md-5">
                    <form method="POST">

                        <!-- INFORMAÇÕES PRINCIPAIS -->

                        <h5 class="fw-semibold mb-4">
                            Informações Principais
                        </h5>

                        <div class="row g-4">

                            <div class="col-md-6">
                                <label class="form-label">Cliente</label>

                                <select name="cliente_id" id="cliente" class="form-control form-control-lg">
                                    <option value="">Selecione</option>

                                    {% for cliente in clientes %}

                                    <option value="{{cliente.id}}">{{cliente.nome}}</option>

                                    {% endfor %}

                                </select>

                            </div>


                            <div class="col-md-6">
                                <label class="form-label">Marca</label>
                                <input type="text" name="marca" class="form-control form-control-lg"
                                    placeholder="Ex: Volkswagen" maxlength="50" required>

                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Modelo</label>
                                <input type="text" name="modelo" class="form-control form-control-lg"
                                    placeholder="Ex: Gol" maxlength="50" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Ano</label>
                                <input type="number" name="ano" class="form-control form-control-lg"
                                    placeholder="Ex: 2020" oninput="this.value=this.value.slice(0,4)" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Placa</label>
                                <input type="text" name="placa" class="form-control form-control-lg text-uppercase"
                                    placeholder="ABC1D23" maxlength="7" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Cor</label>
                                <input type="text" name="cor" class="form-control form-control-lg"
                                    placeholder="Ex: Branco" maxlength="25" required>
                            </div>

                        </div>

                        <!-- OBSERVAÇÕES -->
                        <div class="mt-5">

                            <h5 class="fw-semibold mb-3">
                                Observações
                            </h5>

                            <textarea name="observacoes" class="form-control" rows="5"
                                placeholder="Adicione informações relevantes sobre o veículo"
                                maxlength="150"></textarea>

                        </div>

                        <!-- RODAPÉ -->
                        <hr class="my-5">

                        <div class="d-flex justify-content-between flex-wrap gap-3">

                            <a href="{{ url_for('dashboard') }}" class="btn btn-light border px-4">

                                Cancelar

                            </a>

                            <button type="submit" class="btn btn-primary px-5">

                                Salvar Veículo

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
