<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Sistema</title>

    <link rel="icon" href="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f6e0.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .sidebar .nav-link {
            transition: .2s;
        }

        .sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, .15);
        }
    </style>
</head>

<body >
    <div class="d-flex">
        <div class="sidebar bg-primary text-white vh-100 p-3" style="width:250px;">
            <a href="{{ url_for('dashboard') }}" class="d-block text-white text-decoration-none fw-bold fs-3 mb-4">
                SuperOS
            </a>

            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link rounded p2  " aria-current="page"
                        href="{{ url_for('cadastro_clientes') }}">
                        <i class="bi bi-person-plus me-2"></i>
                        Cadastrar clientes
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('cadastro_funcionarios') }}">
                        <i class="bi bi-person me-2"></i>
                        Cadastrar funcionarios
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('registro_os') }}">
                        <i class="bi bi-clipboard me-2"></i>
                        Registrar OS
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link " href="{{ url_for('cadastro_veiculos') }}">
                        <i class="bi bi-truck me-2"></i>
                        Cadastro de veículos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="">
                        <i class="bi bi-box me-2"></i>
                        Estoque
                    </a>
                </li>

                <li class="nav-item mt-5">
                    <a class="nav-link " href="{{ url_for('sair') }}">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        Sair
                    </a>
                </li>
            </ul>
        </div>

        {% block content %}
        {% endblock %}
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

</html>
